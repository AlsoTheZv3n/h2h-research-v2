name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend — ruff, mypy, alembic, pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: h2h
          POSTGRES_PASSWORD: h2h
          POSTGRES_DB: h2h_test
        ports:
          - 5432:5432
        # Without a healthcheck the steps race the server's first boot.
        options: >-
          --health-cmd "pg_isready -U h2h -d h2h_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://h2h:h2h@localhost:5432/h2h_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        # --frozen: CI must fail on a stale lock rather than silently resolving anew.
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy backend

      # The suite embeds for real -- a stubbed embedder would turn "is retrieval
      # working on meaning?" into "does it call the function I told it to". That
      # means fetching bge-small (~130 MB) from HuggingFace, so cache it: uncached
      # it is a download on every run and a third-party outage away from a red
      # build that has nothing to do with the code.
      - name: Cache the embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-${{ hashFiles('backend/embeddings.py') }}

      - name: Alembic migrations
        run: uv run alembic upgrade head

      - name: Models and migrations must not drift
        # Catches a model edited without a migration -- which would otherwise only
        # surface as a production error long after the PR merged.
        run: uv run alembic check

      - name: Pytest
        # The suite fails rather than skips when Postgres is unreachable: a skip here
        # would let this job go green having tested none of the persistence guarantees.
        run: uv run pytest -v

  frontend:
    name: frontend — typecheck, vitest, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # The version lives in frontend/package.json (packageManager), not at the
          # repo root, and the action looks at the root by default -- so without this
          # it aborts with "No pnpm version is specified".
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        # `tsc -b`, the same thing the build runs. `tsc --noEmit` reads the root
        # config -- which is project references only -- and checks almost nothing.
        run: pnpm run typecheck

      - name: Vitest
        run: pnpm run test

      - name: Build
        run: pnpm run build

  e2e:
    name: e2e — the real stack, via docker compose
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # The version lives in frontend/package.json (packageManager), not at the
          # repo root, and the action looks at the root by default -- so without this
          # it aborts with "No pnpm version is specified".
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Bring up the stack
        # The README's quickstart, run for real. If `docker compose up` stops
        # producing a working app, this job is what says so.
        run: docker compose up -d --build

      - name: Wait for the API
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://localhost:8080/health && exit 0
            sleep 2
          done
          echo "api never became healthy"; docker compose logs; exit 1

      - name: Seed the demo fixture
        # Committed rows from a real ingest, not synthetic. ChEMBL answers in tens of
        # seconds and fails about a third of the time; a CI run that depended on its
        # mood would be a coin flip, and a flaky guard teaches people to ignore red.
        # The network path is covered by the backend suite (test_enrich.py drives the
        # real adapters into a real database), so what this job proves is the rest:
        # DB -> API -> browser.
        run: docker compose exec -T api python -m backend.ingestion.seed_demo

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
        working-directory: frontend

      - name: Playwright
        env:
          E2E_BASE_URL: http://localhost:5173
        run: pnpm exec playwright test
        working-directory: frontend

      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --tail 100

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
