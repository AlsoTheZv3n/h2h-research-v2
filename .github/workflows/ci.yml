name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: h2h
          POSTGRES_PASSWORD: h2h
          POSTGRES_DB: h2h_test
        ports:
          - 5432:5432
        # Without a healthcheck the steps race the server's first boot.
        options: >-
          --health-cmd "pg_isready -U h2h -d h2h_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://h2h:h2h@localhost:5432/h2h_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        # --frozen: CI must fail on a stale lock rather than silently resolving anew.
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy backend

      - name: Alembic migrations
        run: uv run alembic upgrade head

      - name: Models and migrations must not drift
        # Catches a model edited without a migration -- which would otherwise only
        # surface as a production error long after the PR merged.
        run: uv run alembic check

      - name: Pytest
        run: uv run pytest -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: h2h-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Container must answer /health
        run: |
          docker run -d --name h2h-ci -p 8000:8000 h2h-api:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health; then
              echo "healthy"; docker rm -f h2h-ci; exit 0
            fi
            sleep 2
          done
          echo "never became healthy"; docker logs h2h-ci; docker rm -f h2h-ci; exit 1
