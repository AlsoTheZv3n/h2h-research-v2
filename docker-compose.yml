services:
  # The one people open. `docker compose up` has to bring up the actual product,
  # not the half of it that has no UI.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Service names, not localhost: these resolve on the compose network.
      DATABASE_URL: postgresql+asyncpg://h2h:h2h@postgres:5432/h2h
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      NCBI_API_KEY: ${NCBI_API_KEY:-}
      NCBI_TOOL: ${NCBI_TOOL:-}
      NCBI_EMAIL: ${NCBI_EMAIL:-}
      # The chat's model. Both empty is a supported, designed state: the ask box says
      # no model is configured rather than breaking, and everything else works.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CHAT_MODEL: ${CHAT_MODEL:-claude-haiku-4-5}
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
    ports:
      # Host ports are overridable via .env because localhost is shared with whatever
      # else a dev runs -- WSL forwards its own listeners onto Windows' localhost, and
      # a shadowed port fails as a confusing 404/timeout from a *different* server
      # rather than as a bind error. Container ports never move.
      - "${API_PORT:-8080}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # The refresh cron: fills drugs ahead of demand AND re-enriches stale ones, on a
  # schedule (daily by default) rather than the tight loop the old pre-warmer ran. Same
  # image as the api, different command; it shares Postgres and speaks HTTP to no one,
  # so it needs no port and no healthcheck. Waits for the api to be healthy because
  # migrations run in the api's entrypoint -- it must not write before the schema
  # exists. It sleeps between passes; on a fresh stack an early pass finds nothing until
  # the loader has run, and it simply tries again next interval. For a real external
  # scheduler instead of the in-stack service, run `python -m backend.refresh --once`.
  refresh:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "backend.refresh"]
    environment:
      DATABASE_URL: postgresql+asyncpg://h2h:h2h@postgres:5432/h2h
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      NCBI_API_KEY: ${NCBI_API_KEY:-}
      NCBI_TOOL: ${NCBI_TOOL:-}
      NCBI_EMAIL: ${NCBI_EMAIL:-}
      REFRESH_INTERVAL_SECONDS: ${REFRESH_INTERVAL_SECONDS:-86400}
      FRESHNESS_DAYS: ${FRESHNESS_DAYS:-30}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    # pgvector-enabled: RAG lands later, and swapping the image afterwards would
    # mean a migration on a populated volume.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: h2h
      POSTGRES_PASSWORD: h2h
      POSTGRES_DB: h2h
    ports:
      # Published only so host tooling (alembic, psql) can reach it; the api talks
      # over the compose network regardless.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # -U/-d: without them pg_isready probes the postgres/postgres default and
      # can report ready before this database exists.
      test: ["CMD-SHELL", "pg_isready -U h2h -d h2h"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
