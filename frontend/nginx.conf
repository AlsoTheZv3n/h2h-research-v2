server {
    listen 8080;
    # IPv6 too: the healthcheck's busybox wget resolves localhost to ::1 first, so an
    # IPv4-only listen leaves the container permanently unhealthy -- on the first
    # command a stranger runs. Making the probe true beats pointing it at 127.0.0.1.
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;

    # The API lives under /api and the prefix is stripped on the way out. This is not
    # cosmetic: the SPA owns /drugs/:id as a route, so proxying bare /drugs would make
    # a direct load or a refresh of a detail page return JSON instead of the app.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # A cold drug enriches on first open; the request itself returns immediately,
        # but leave room for the slow ones rather than 504-ing a working page.
        proxy_read_timeout 120s;
    }

    # The ask endpoint needs a bigger budget than anything else here, and 120s was
    # measured to be too small. A question means an embedding, a vector search, and
    # then a model generating tokens -- and a cold local model loads several GB of
    # weights off disk before the first one. nginx cut the request off mid-answer,
    # the browser got a 504, and a working model read as a broken app. Found by an
    # E2E test against a real Ollama; a mocked answer would never have taken long
    # enough to reach it.
    #
    # A regex location, which nginx evaluates before any prefix match, so this wins
    # for /api/drugs/X/ask while `location /api/` still serves everything else. The
    # capture group is load-bearing: the prefix block strips /api via its trailing
    # slash on proxy_pass, and a regex proxy_pass cannot do that -- so the path is
    # captured and re-passed without the prefix. Without it, the API sees
    # /api/drugs/... and 404s.
    location ~ ^/api/(drugs/[^/]+/ask)$ {
        proxy_pass http://api:8000/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /health {
        proxy_pass http://api:8000/health;
    }

    location / {
        # SPA: every unknown path is a client-side route, so hand back index.html and
        # let the router decide. Without this, refreshing /drugs/CHEMBL123 is a 404.
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints its assets, so they can be cached hard; index.html must not be,
    # or a deploy leaves browsers pointing at bundles that no longer exist.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;
}
